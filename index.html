<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>委員会決定システム</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="委員会">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1E5A70">
<style>
:root {
  --ink: #1a1f2e;
  --ink2: #3d4560;
  --muted: #8890a8;
  --bg: #f4f5f8;
  --white: #ffffff;
  --border: #e0e3ec;
  --primary: #2D7D9A;
  --primary-d: #1E5A70;
  --primary-l: #e8f4f8;
  --accent: #E67E22;
  --success: #27AE60;
  --success-l: #e8f5ee;
  --danger: #E74C3C;
  --danger-l: #fdecea;
  --warn: #F1C40F;
  --daihyo: #7B2FBE;
  --daihyo-l: #f3e8ff;
  --gakkyu: #1565C0;
  --gakkyu-l: #e3f0ff;
  --rank-a: #27AE60;
  --rank-b: #3498DB;
  --rank-c: #95a5a6;
  --rank-none: #dde1ea;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: var(--bg); color: var(--ink);
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.app-header {
  background: linear-gradient(135deg, var(--primary-d), var(--primary));
  color: white; padding: 0 16px; height: 52px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10;
}
.app-header h1 { font-size: 0.98rem; font-weight: 700; flex: 1; }
.header-tabs { display: flex; gap: 3px; }
.htab {
  padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.8); background: transparent;
  font-size: 0.78rem; font-family: inherit;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.htab.active { background: white; color: var(--primary); border-color: white; font-weight: 700; }
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tab-view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.tab-view.active { display: flex; }

/* ===== タブ① ===== */
.input-layout { display: flex; flex: 1; overflow: hidden; }
.student-sidebar {
  width: 200px; flex-shrink: 0; background: white;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-header h3 { font-size: 0.84rem; color: var(--ink2); margin-bottom: 7px; }
.sidebar-actions { display: flex; gap: 5px; }
.btn-sm {
  flex: 1; padding: 5px 6px; border-radius: 7px;
  border: 1.5px solid var(--border); background: white; color: var(--ink2);
  font-size: 0.72rem; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-sm:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm.primary { background: var(--primary); color: white; border-color: var(--primary); }
.btn-sm.primary:hover { background: var(--primary-d); }
.student-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 6px; }
.student-item {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 9px; border-radius: 8px; cursor: pointer;
  transition: all 0.15s; border: 1.5px solid transparent; margin-bottom: 2px;
}
.student-item:hover { background: var(--primary-l); }
.student-item.active { background: var(--primary-l); border-color: var(--primary); }
.stu-num {
  width: 21px; height: 21px; border-radius: 50%;
  background: var(--primary); color: white;
  font-size: 0.6rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stu-name { font-size: 0.8rem; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stu-badge { font-size: 0.58rem; font-weight: 700; padding: 1px 5px; border-radius: 10px; flex-shrink: 0; }
.stu-badge.complete { background: var(--success-l); color: var(--success); }
.stu-badge.partial  { background: #fff3e0; color: var(--accent); }

.input-form-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 20px; }
.form-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--muted); gap: 10px;
}
.form-placeholder .icon { font-size: 2.8rem; opacity: 0.35; }
.form-placeholder p { font-size: 0.88rem; }

.student-form { max-width: 660px; }
.form-student-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 2px solid var(--border);
}
.form-student-header h2 { font-size: 1.08rem; }
.num-badge {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--primary); color: white;
  font-size: 0.78rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* リーダー職ブロック */
.leader-section {
  border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; border: 2px solid;
}
.leader-section.daihyo { background: var(--daihyo-l); border-color: var(--daihyo); }
.leader-section.gakkyu { background: var(--gakkyu-l); border-color: var(--gakkyu); }
.leader-section-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.9rem; font-weight: 800; margin-bottom: 11px;
}
.leader-section.daihyo .leader-section-title { color: var(--daihyo); }
.leader-section.gakkyu .leader-section-title { color: var(--gakkyu); }
.leader-desc { font-size: 0.7rem; color: var(--muted); margin-left: auto; font-weight: 500; }
.leader-wish-row { display: flex; gap: 8px; align-items: flex-start; }
.wish-toggle-group { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; padding-top: 2px; }
.wish-toggle {
  padding: 7px 13px; border-radius: 8px;
  border: 2px solid var(--border); background: white;
  font-size: 0.8rem; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.15s; min-height: 36px; color: var(--muted);
}
.wish-toggle.sel-yes.daihyo { background: var(--daihyo); border-color: var(--daihyo); color: white; }
.wish-toggle.sel-yes.gakkyu { background: var(--gakkyu); border-color: var(--gakkyu); color: white; }
.wish-toggle.sel-no  { background: #f0f2f5; border-color: #ccc; color: #aaa; }
.leader-reason {
  flex: 1; padding: 8px 11px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.83rem; font-family: inherit;
  resize: none; min-height: 72px; background: white;
}
.leader-reason:focus { outline: none; border-color: var(--primary); }
.leader-reason:disabled { background: #f5f5f5; color: #bbb; }
.rank-btns { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.rank-btn {
  width: 30px; height: 30px; border-radius: 6px;
  border: 2px solid var(--rank-none); background: var(--rank-none);
  font-size: 0.8rem; font-weight: 800; cursor: pointer;
  transition: all 0.15s; color: white; font-family: inherit;
}
.rank-btn:hover { opacity: 0.85; }
.rank-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.rank-btn.sel-A { background: var(--rank-a); border-color: var(--rank-a); }
.rank-btn.sel-B { background: var(--rank-b); border-color: var(--rank-b); }
.rank-btn.sel-C { background: var(--rank-c); border-color: var(--rank-c); }

.section-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0 12px; color: var(--muted);
  font-size: 0.78rem; font-weight: 700;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.pref-block {
  background: white; border-radius: 11px;
  padding: 13px 14px; margin-bottom: 11px;
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
}
.pref-label {
  font-size: 0.75rem; font-weight: 700; color: var(--muted);
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.pref-num {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; font-weight: 800; color: white; flex-shrink: 0;
}
.pref-num.n1 { background: var(--accent); }
.pref-num.n2 { background: var(--primary); }
.pref-num.n3 { background: var(--muted); }
.pref-row { display: flex; gap: 8px; align-items: flex-start; }
.pref-select {
  flex: 0 0 148px; padding: 8px 10px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.82rem; font-family: inherit; background: white; cursor: pointer;
}
.pref-select:focus { outline: none; border-color: var(--primary); }
.pref-reason {
  flex: 1; padding: 8px 10px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.82rem; font-family: inherit; resize: none; min-height: 66px;
}
.pref-reason:focus { outline: none; border-color: var(--primary); }
.form-save-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-save {
  flex: 1; padding: 11px; border-radius: 9px; border: none;
  background: var(--primary); color: white;
  font-size: 0.9rem; font-weight: 700; font-family: inherit; cursor: pointer;
}
.btn-save:hover { background: var(--primary-d); }
.btn-del {
  padding: 11px 15px; border-radius: 9px;
  border: 1.5px solid var(--border); background: white;
  color: var(--muted); font-size: 0.85rem; font-family: inherit; cursor: pointer;
}
.btn-del:hover { border-color: var(--danger); color: var(--danger); }

/* ===== タブ② ===== */
.committee-layout { display: flex; flex: 1; overflow: hidden; }
.committee-list-panel {
  width: 235px; flex-shrink: 0; background: white;
  border-right: 1px solid var(--border);
  overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px;
}
.panel-section-label {
  font-size: 0.7rem; font-weight: 700; color: var(--muted);
  padding: 6px 8px 3px; letter-spacing: 0.04em;
}
.comm-item {
  padding: 9px 10px; border-radius: 10px; cursor: pointer;
  margin-bottom: 3px; border: 1.5px solid transparent; transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.comm-item:hover { background: var(--primary-l); }
.comm-item.active { background: var(--primary-l); border-color: var(--primary); }
.comm-item.is-daihyo:hover, .comm-item.is-daihyo.active { background: var(--daihyo-l); border-color: var(--daihyo); }
.comm-item.is-gakkyu:hover, .comm-item.is-gakkyu.active { background: var(--gakkyu-l); border-color: var(--gakkyu); }
.comm-icon { font-size: 1.15rem; flex-shrink: 0; }
.comm-info { flex: 1; min-width: 0; }
.comm-name { font-size: 0.82rem; font-weight: 600; }
.comm-cap { font-size: 0.66rem; color: var(--muted); }
.comm-fill { font-size: 0.66rem; font-weight: 700; padding: 1px 6px; border-radius: 10px; flex-shrink: 0; }
.comm-fill.ok    { background: var(--success-l); color: var(--success); }
.comm-fill.over  { background: var(--danger-l);  color: var(--danger); }
.comm-fill.empty { background: var(--bg); color: var(--muted); }

.committee-detail-panel { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 20px; }
.comm-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.comm-detail-title { font-size: 1.08rem; font-weight: 700; }
.comm-cap-badge {
  padding: 3px 11px; border-radius: 20px;
  background: var(--primary-l); color: var(--primary);
  font-size: 0.76rem; font-weight: 700;
}
.comm-cap-badge.daihyo { background: var(--daihyo-l); color: var(--daihyo); }
.comm-cap-badge.gakkyu { background: var(--gakkyu-l); color: var(--gakkyu); }

.applicant-card {
  background: white; border-radius: 11px;
  padding: 12px 14px; margin-bottom: 8px;
  border: 1.5px solid var(--border); box-shadow: var(--shadow);
  display: flex; align-items: flex-start; gap: 10px; transition: all 0.15s;
}
.applicant-card.assigned { border-color: var(--success); background: var(--success-l); }
.applicant-card.conflict { border-color: var(--warn); background: #fffde7; }
.app-meta { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.app-pref-badge {
  font-size: 0.6rem; font-weight: 800; padding: 2px 6px;
  border-radius: 10px; color: white; white-space: nowrap;
}
.app-pref-badge.wish { background: var(--daihyo); }
.app-pref-badge.p1   { background: var(--accent); }
.app-pref-badge.p2   { background: var(--primary); }
.app-pref-badge.p3   { background: var(--muted); }
.rank-badge {
  width: 26px; height: 26px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; font-weight: 800; color: white;
}
.rank-badge.A    { background: var(--rank-a); }
.rank-badge.B    { background: var(--rank-b); }
.rank-badge.C    { background: var(--rank-c); }
.rank-badge.none { background: var(--rank-none); color: var(--muted); }
.app-body { flex: 1; min-width: 0; }
.app-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 3px; }
.app-reason { font-size: 0.78rem; color: var(--ink2); line-height: 1.5; }
.app-score { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }
.app-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
.assign-btn {
  padding: 6px 12px; border-radius: 8px;
  border: 1.5px solid var(--success); background: white; color: var(--success);
  font-size: 0.74rem; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.assign-btn:hover { background: var(--success); color: white; }
.assign-btn.assigned { background: var(--success); color: white; }
.assign-btn.disabled { opacity: 0.4; cursor: not-allowed; border-color: var(--muted); color: var(--muted); }
.unassign-btn {
  padding: 6px 12px; border-radius: 8px;
  border: 1.5px solid var(--border); background: white; color: var(--muted);
  font-size: 0.74rem; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.unassign-btn:hover { border-color: var(--danger); color: var(--danger); }
.no-applicants { color: var(--muted); font-size: 0.86rem; padding: 36px 0; text-align: center; }

/* ===== タブ③ ===== */
.result-layout { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 20px; }
.result-toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
.result-toolbar h2 { font-size: 0.96rem; font-weight: 700; flex: 1; }
.leader-result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.leader-result-card { border-radius: 12px; overflow: hidden; border: 2px solid; box-shadow: var(--shadow); }
.leader-result-card.daihyo { border-color: var(--daihyo); }
.leader-result-card.gakkyu { border-color: var(--gakkyu); }
.lr-header { padding: 10px 14px; color: white; display: flex; align-items: center; gap: 8px; }
.lr-header.daihyo { background: var(--daihyo); }
.lr-header.gakkyu { background: var(--gakkyu); }
.lr-title { font-size: 0.88rem; font-weight: 700; flex: 1; }
.lr-count { font-size: 0.74rem; opacity: 0.85; }
.lr-body { background: white; padding: 10px 14px; }
.result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.result-card { background: white; border-radius: 12px; border: 1.5px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
.result-card-header {
  padding: 10px 13px;
  background: linear-gradient(135deg, var(--primary-d), var(--primary));
  color: white; display: flex; align-items: center; gap: 7px;
}
.result-card-title { font-size: 0.87rem; font-weight: 700; flex: 1; }
.result-card-count { font-size: 0.72rem; opacity: 0.85; }
.result-card-body { padding: 9px 13px; }
.result-member {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem;
}
.result-member:last-child { border-bottom: none; }
.result-member .num { color: var(--muted); font-size: 0.67rem; width: 18px; flex-shrink: 0; }
.result-member .mname { flex: 1; font-weight: 600; }
.result-member .mpref { font-size: 0.63rem; padding: 1px 5px; border-radius: 8px; color: white; flex-shrink: 0; }
.result-member .mpref.wish { background: var(--daihyo); }
.result-member .mpref.p1   { background: var(--accent); }
.result-member .mpref.p2   { background: var(--primary); }
.result-member .mpref.p3   { background: var(--muted); }
.result-member .mrank { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.67rem; font-weight: 800; color: white; flex-shrink: 0; }
.result-member .mrank.A { background: var(--rank-a); }
.result-member .mrank.B { background: var(--rank-b); }
.result-member .mrank.C { background: var(--rank-c); }
.result-empty { color: var(--muted); font-size: 0.78rem; padding: 6px 0; font-style: italic; }
.result-over { background: var(--danger-l); color: var(--danger); font-size: 0.72rem; padding: 3px 8px; border-radius: 6px; margin-top: 5px; font-weight: 600; }
.unassigned-section {
  background: var(--danger-l); border-radius: 11px;
  padding: 12px 14px; margin-bottom: 14px; border: 1.5px solid var(--danger);
}
.unassigned-section h3 { font-size: 0.84rem; font-weight: 700; color: var(--danger); margin-bottom: 7px; }
.unassigned-chip {
  display: inline-flex; align-items: center; gap: 3px;
  background: white; border: 1px solid var(--danger);
  border-radius: 20px; padding: 2px 9px;
  font-size: 0.74rem; margin: 2px; color: var(--ink);
}

/* モーダル */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 1000;
  align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: 14px; width: 100%; max-width: 360px; box-shadow: var(--shadow-md); overflow: hidden; }
.modal-header {
  padding: 14px 18px;
  background: linear-gradient(135deg, var(--primary-d), var(--primary));
  color: white; display: flex; justify-content: space-between; align-items: center;
}
.modal-header h3 { font-size: 0.94rem; font-weight: 700; }
.modal-close { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }
.modal-body { padding: 18px; }
.modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.form-label { font-size: 0.8rem; font-weight: 600; color: var(--ink2); margin-bottom: 4px; display: block; }
.form-input {
  width: 100%; padding: 8px 11px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 0.88rem; font-family: inherit; margin-bottom: 11px;
}
.form-input:focus { outline: none; border-color: var(--primary); }
.btn-modal-ok { padding: 9px 22px; border-radius: 8px; border: none; background: var(--primary); color: white; font-size: 0.88rem; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-modal-cancel { padding: 9px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: white; color: var(--muted); font-size: 0.86rem; font-family: inherit; cursor: pointer; }
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: white;
  padding: 10px 20px; border-radius: 12px;
  font-size: 0.85rem; z-index: 9999; transition: transform 0.25s; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.toast.error   { background: var(--danger); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #ccd0dc; border-radius: 4px; }
</style>
</head>
<body>

<div class="app-header">
  <h1>🏛️ 委員会決定システム</h1>
  <div class="header-tabs">
    <button class="htab active" onclick="switchTab('input')">① 希望入力</button>
    <button class="htab" onclick="switchTab('committee')">② 選考</button>
    <button class="htab" onclick="switchTab('result')">③ 決定結果</button>
  </div>
</div>

<div class="main">
  <!-- タブ① -->
  <div class="tab-view active" id="tab-input">
    <div class="input-layout">
      <div class="student-sidebar">
        <div class="sidebar-header">
          <h3>児童一覧</h3>
          <div class="sidebar-actions">
            <button class="btn-sm primary" onclick="openAddStudentModal()">＋追加</button>
            <button class="btn-sm" onclick="clearAllStudents()" style="color:var(--danger);border-color:var(--danger)">全消去</button>
          </div>
          <button class="btn-sm" onclick="openPasteModal()" style="margin-top:5px;width:100%;background:#f0f9e8;border-color:var(--success);color:var(--success);font-size:0.7rem">
            📋 名簿を貼り付けて読込
          </button>
        </div>
        <div class="student-list" id="studentList"></div>
      </div>
      <div class="input-form-area" id="inputFormArea">
        <div class="form-placeholder">
          <div class="icon">👈</div>
          <p>児童を選んで希望を入力</p>
          <p style="font-size:0.76rem;color:var(--muted)">まず「＋追加」で児童を登録してください</p>
        </div>
      </div>
    </div>
  </div>

  <!-- タブ② -->
  <div class="tab-view" id="tab-committee">
    <div class="committee-layout">
      <div class="committee-list-panel" id="committeeListPanel"></div>
      <div class="committee-detail-panel" id="committeeDetailPanel">
        <div class="form-placeholder"><div class="icon">🏛️</div><p>左から委員会を選んでください</p></div>
      </div>
    </div>
  </div>

  <!-- タブ③ -->
  <div class="tab-view" id="tab-result">
    <div class="result-layout">
      <div class="result-toolbar">
        <h2>委員会決定結果</h2>
        <button class="btn-sm primary" onclick="renderResult()">🔄 更新</button>
        <button class="btn-sm" onclick="exportCSV()">📋 CSV出力</button>
      </div>
      <div id="unassignedSection"></div>
      <div class="leader-result-grid" id="leaderResultGrid"></div>
      <div class="result-grid" id="resultGrid"></div>
    </div>
  </div>
</div>

<!-- 追加モーダル -->
<div class="modal-overlay" id="addStudentModal">
  <div class="modal">
    <div class="modal-header">
      <h3>児童を追加</h3>
      <button class="modal-close" onclick="closeModal('addStudentModal')">×</button>
    </div>
    <div class="modal-body">
      <label class="form-label">出席番号</label>
      <input class="form-input" id="newStudentNum" type="number" min="1" max="99" placeholder="例：1">
      <label class="form-label">氏名</label>
      <input class="form-input" id="newStudentName" type="text" placeholder="例：山田 太郎">
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal('addStudentModal')">キャンセル</button>
      <button class="btn-modal-ok" onclick="addStudent()">追加</button>
    </div>
  </div>
</div>

<!-- 名簿貼り付けモーダル -->
<div class="modal-overlay" id="pasteModal">
  <div class="modal">
    <div class="modal-header">
      <h3>📋 名簿を貼り付けて読込</h3>
      <button class="modal-close" onclick="closeModal('pasteModal')">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.8rem;color:var(--ink2);margin-bottom:10px;line-height:1.6">
        CM CLASSの名簿をコピーして貼り付けてください。<br>
        <span style="color:var(--muted)">形式：名前,性別（1行1人）</span>
      </p>
      <div style="background:#f8f9fc;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:0.78rem;color:var(--muted);font-family:monospace;line-height:1.8">
        山田 太郎,男<br>
        鈴木 花子,女<br>
        田中 次郎,男
      </div>
      <label class="form-label">名簿データ（貼り付け）</label>
      <textarea id="pasteArea" style="width:100%;height:200px;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem;font-family:inherit;resize:vertical" placeholder="ここに貼り付けてください…"></textarea>
      <p id="pastePreview" style="font-size:0.76rem;color:var(--success);margin-top:6px"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal('pasteModal')">キャンセル</button>
      <button class="btn-modal-ok" onclick="executePasteImport()">読み込む</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 定数
// ============================================================
const LEADERS = [
  { id:'daihyo', name:'代表委員会', cap:1, icon:'🌟', desc:'学校のリーダー', cls:'daihyo' },
  { id:'gakkyu', name:'学級委員会', cap:2, icon:'📣', desc:'クラスのリーダー', cls:'gakkyu' },
];
const COMMITTEES = [
  { id:'taiiku',  name:'体育委員会',       cap:3, icon:'⚽' },
  { id:'hoken',   name:'保健委員会',       cap:3, icon:'🏥' },
  { id:'tosho',   name:'図書委員会',       cap:3, icon:'📚' },
  { id:'shikuen', name:'飼育園芸委員会',   cap:3, icon:'🌱' },
  { id:'bika',    name:'美化委員会',       cap:3, icon:'🧹' },
  { id:'bunka',   name:'文化委員会',       cap:3, icon:'🎨' },
  { id:'hoso',    name:'放送委員会',       cap:3, icon:'📻' },
  { id:'volunt',  name:'ボランティア委員会', cap:3, icon:'🤝' },
];
const RANK_SCORE = { A:3, B:2, C:1, '':0 };
const PREF_SCORE = { 1:3, 2:2, 3:1 };

// ============================================================
// 状態
// ============================================================
let students    = [];  // [{id,num,name, leaderPrefs:{daihyo:{wish,reason,rank},gakkyu:{...}}, prefs:[{commId,reason,rank}x3]}]
let assignments = {};  // {commId:[studentId,...]}  通常委員会
let leaderAsgn  = {};  // {leaderId:[studentId,...]}
let activeStu   = null;
let activeComm  = null;
let toastTmr    = null;

// ============================================================
// ストレージ
// ============================================================
function save() {
  try {
    localStorage.setItem('cm2_stu',  JSON.stringify(students));
    localStorage.setItem('cm2_asgn', JSON.stringify(assignments));
    localStorage.setItem('cm2_ldr',  JSON.stringify(leaderAsgn));
  } catch(e){}
}
function load() {
  try {
    const s=localStorage.getItem('cm2_stu');
    const a=localStorage.getItem('cm2_asgn');
    const l=localStorage.getItem('cm2_ldr');
    if(s) students=JSON.parse(s);
    if(a) assignments=JSON.parse(a);
    if(l) leaderAsgn=JSON.parse(l);
  } catch(e){}
}

// ============================================================
// タブ
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  ['input','committee','result'].forEach((t,i)=>{
    if(t===tab) document.querySelectorAll('.htab')[i].classList.add('active');
  });
  if(tab==='committee') renderCommTab();
  if(tab==='result')    renderResult();
}

// ============================================================
// トースト / モーダル
// ============================================================
function showToast(msg,type) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type||'')+' show';
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2200);
}
function openAddStudentModal() {
  document.getElementById('newStudentNum').value=students.length+1;
  document.getElementById('newStudentName').value='';
  document.getElementById('addStudentModal').classList.add('active');
  setTimeout(()=>document.getElementById('newStudentName').focus(),100);
}
function closeModal(id){document.getElementById(id).classList.remove('active');}

// ============================================================
// 児童管理
// ============================================================
function makeStu(id,num,name){
  return {id,num,name,
    leaderPrefs:{
      daihyo:{wish:'',reason:'',rank:''},
      gakkyu:{wish:'',reason:'',rank:''},
    },
    prefs:[
      {commId:'',reason:'',rank:''},
      {commId:'',reason:'',rank:''},
      {commId:'',reason:'',rank:''},
    ]
  };
}
function addStudent(){
  const num=parseInt(document.getElementById('newStudentNum').value);
  const name=document.getElementById('newStudentName').value.trim();
  if(!name){showToast('氏名を入力してください','error');return;}
  if(!num||num<1){showToast('出席番号を入力してください','error');return;}
  const id=Date.now()+Math.random();
  students.push(makeStu(id,num,name));
  students.sort((a,b)=>a.num-b.num);
  save(); closeModal('addStudentModal'); renderStudentList();
  selectStu(students.find(s=>s.id===id));
  showToast('追加しました','success');
}
function clearAllStudents(){
  if(!confirm('全データを消去しますか？'))return;
  students=[];assignments={};leaderAsgn={};activeStu=null;
  save(); renderStudentList();
  document.getElementById('inputFormArea').innerHTML=`<div class="form-placeholder"><div class="icon">👈</div><p>児童を選んでください</p></div>`;
  showToast('消去しました');
}
function renderStudentList(){
  const el=document.getElementById('studentList');
  if(!students.length){
    el.innerHTML='<div style="text-align:center;padding:18px;color:var(--muted);font-size:0.78rem">「＋追加」で登録</div>';
    return;
  }
  el.innerHTML=students.map(s=>{
    const lFilled=Object.values(s.leaderPrefs).filter(l=>l.wish==='yes').length;
    const cFilled=s.prefs.filter(p=>p.commId).length;
    const total=lFilled+cFilled;
    const hasRank=Object.values(s.leaderPrefs).filter(l=>l.wish==='yes'&&l.rank).length
                 +s.prefs.filter(p=>p.commId&&p.rank).length;
    const badge=total>0
      ?`<span class="stu-badge ${hasRank>=total?'complete':'partial'}">${hasRank>=total?'完了':'途中'}</span>`:'';
    return `<div class="student-item ${activeStu&&activeStu.id===s.id?'active':''}" onclick="selectStuById('${s.id}')">
      <div class="stu-num">${s.num}</div>
      <div class="stu-name">${esc(s.name)}</div>${badge}
    </div>`;
  }).join('');
}
function selectStuById(id){const s=students.find(st=>st.id==id);if(s)selectStu(s);}
function selectStu(s){
  activeStu=students.find(st=>st.id===s.id);
  if(!activeStu)return;
  renderStudentList(); renderForm();
}

// ============================================================
// 入力フォーム
// ============================================================
function renderForm(){
  const s=activeStu;

  // リーダー職ブロック×2
  const leaderBlocks=LEADERS.map(ldr=>{
    const lp=s.leaderPrefs[ldr.id]||{wish:'',reason:'',rank:''};
    const isYes=lp.wish==='yes', isNo=lp.wish==='no';
    const rankBtns=['A','B','C'].map(r=>
      `<button class="rank-btn ${lp.rank===r?'sel-'+r:''}" ${!isYes?'disabled':''} onclick="setLdrRank('${ldr.id}','${r}')">${r}</button>`
    ).join('');
    return `<div class="leader-section ${ldr.cls}">
      <div class="leader-section-title">
        ${ldr.icon} ${ldr.name}
        <span class="leader-desc">定員${ldr.cap}名 ／ ${ldr.desc}</span>
      </div>
      <div class="leader-wish-row">
        <div class="wish-toggle-group">
          <button class="wish-toggle ${isYes?'sel-yes '+ldr.cls:''}" onclick="setLdrWish('${ldr.id}','yes')">希望する</button>
          <button class="wish-toggle ${isNo?'sel-no':''}"  onclick="setLdrWish('${ldr.id}','no')">希望しない</button>
        </div>
        <textarea class="leader-reason" ${!isYes?'disabled':''} placeholder="${isYes?'希望理由を入力…':'（希望する場合のみ）'}" onchange="setLdrReason('${ldr.id}',this.value)">${esc(lp.reason)}</textarea>
        <div class="rank-btns">${rankBtns}</div>
      </div>
    </div>`;
  }).join('');

  // 通常委員会ブロック×3
  const commBlocks=[0,1,2].map(i=>{
    const p=s.prefs[i];
    const labels=['第一希望','第二希望','第三希望'];
    const cls=['n1','n2','n3'];
    const rankBtns=['A','B','C'].map(r=>
      `<button class="rank-btn ${p.rank===r?'sel-'+r:''}" onclick="setPrefRank(${i},'${r}')">${r}</button>`
    ).join('');
    return `<div class="pref-block">
      <div class="pref-label"><div class="pref-num ${cls[i]}">${i+1}</div>${labels[i]}</div>
      <div class="pref-row">
        <select class="pref-select" onchange="setPrefComm(${i},this.value)">
          <option value="">委員会を選択</option>
          ${COMMITTEES.map(c=>`<option value="${c.id}" ${p.commId===c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}
        </select>
        <textarea class="pref-reason" placeholder="希望理由を入力…" onchange="setPrefReason(${i},this.value)">${esc(p.reason)}</textarea>
        <div class="rank-btns">${rankBtns}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('inputFormArea').innerHTML=`
    <div class="student-form">
      <div class="form-student-header">
        <div class="num-badge">${s.num}</div>
        <h2>${esc(s.name)}</h2>
      </div>
      ${leaderBlocks}
      <div class="section-divider">📋 通常委員会（第一〜第三希望）</div>
      ${commBlocks}
      <div class="form-save-row">
        <button class="btn-save" onclick="savePrefs()">💾 保存</button>
        <button class="btn-del" onclick="deleteStu()">🗑 削除</button>
      </div>
    </div>`;
}

// ---- リーダー操作 ----
function setLdrWish(lid,val){
  if(!activeStu)return;
  const cur=activeStu.leaderPrefs[lid].wish;
  activeStu.leaderPrefs[lid].wish=cur===val?'':val;
  if(activeStu.leaderPrefs[lid].wish!=='yes'){
    activeStu.leaderPrefs[lid].reason='';
    activeStu.leaderPrefs[lid].rank='';
  }
  renderForm();
}
function setLdrReason(lid,val){if(activeStu)activeStu.leaderPrefs[lid].reason=val;}
function setLdrRank(lid,rank){
  if(!activeStu)return;
  const cur=activeStu.leaderPrefs[lid].rank;
  activeStu.leaderPrefs[lid].rank=cur===rank?'':rank;
  renderForm();
}

// ---- 通常委員会操作 ----
function setPrefComm(i,v){if(activeStu)activeStu.prefs[i].commId=v;}
function setPrefReason(i,v){if(activeStu)activeStu.prefs[i].reason=v;}
function setPrefRank(i,rank){
  if(!activeStu)return;
  const cur=activeStu.prefs[i].rank;
  activeStu.prefs[i].rank=cur===rank?'':rank;
  renderForm();
}

function savePrefs(){
  if(!activeStu)return;
  // フォームから最新値同期
  document.querySelectorAll('.pref-select').forEach((el,i)=>{activeStu.prefs[i].commId=el.value;});
  document.querySelectorAll('.pref-reason').forEach((el,i)=>{activeStu.prefs[i].reason=el.value;});
  // リーダー理由（leader-reasonは2つ）
  document.querySelectorAll('.leader-reason').forEach((el,i)=>{
    const lid=LEADERS[i]?.id; if(lid)activeStu.leaderPrefs[lid].reason=el.value;
  });
  const idx=students.findIndex(s=>s.id===activeStu.id);
  if(idx>=0)students[idx]=activeStu;
  save(); renderStudentList(); showToast('保存しました','success');
}
function deleteStu(){
  if(!activeStu)return;
  if(!confirm(`「${activeStu.name}」を削除しますか？`))return;
  const id=activeStu.id;
  Object.keys(assignments).forEach(c=>{assignments[c]=assignments[c].filter(x=>x!==id);});
  Object.keys(leaderAsgn).forEach(l=>{leaderAsgn[l]=leaderAsgn[l].filter(x=>x!==id);});
  students=students.filter(s=>s.id!==id); activeStu=null;
  save(); renderStudentList();
  document.getElementById('inputFormArea').innerHTML=`<div class="form-placeholder"><div class="icon">👈</div><p>児童を選んでください</p></div>`;
  showToast('削除しました');
}

// ============================================================
// 選考タブ
// ============================================================
function renderCommTab(){
  const panel=document.getElementById('committeeListPanel');
  const ldrItems=LEADERS.map(ldr=>{
    const cnt=(leaderAsgn[ldr.id]||[]).length;
    const fc=cnt===0?'empty':cnt>ldr.cap?'over':'ok';
    return `<div class="comm-item is-${ldr.cls} ${activeComm===ldr.id?'active':''}" onclick="selectComm('${ldr.id}')">
      <div class="comm-icon">${ldr.icon}</div>
      <div class="comm-info"><div class="comm-name">${ldr.name}</div><div class="comm-cap">定員 ${ldr.cap}名</div></div>
      <div class="comm-fill ${fc}">${cnt}/${ldr.cap}</div>
    </div>`;
  }).join('');
  const commItems=COMMITTEES.map(c=>{
    const cnt=(assignments[c.id]||[]).length;
    const fc=cnt===0?'empty':cnt>c.cap?'over':'ok';
    return `<div class="comm-item ${activeComm===c.id?'active':''}" onclick="selectComm('${c.id}')">
      <div class="comm-icon">${c.icon}</div>
      <div class="comm-info"><div class="comm-name">${c.name}</div><div class="comm-cap">定員 ${c.cap}名</div></div>
      <div class="comm-fill ${fc}">${cnt}/${c.cap}</div>
    </div>`;
  }).join('');
  panel.innerHTML=`
    <div class="panel-section-label">🌟 リーダー職</div>${ldrItems}
    <div class="panel-section-label" style="margin-top:10px">📋 通常委員会</div>${commItems}`;
  if(activeComm)renderCommDetail(activeComm);
}
function selectComm(id){activeComm=id;renderCommTab();renderCommDetail(id);}

function isLdrId(id){return LEADERS.some(l=>l.id===id);}
function getCommInfo(id){return LEADERS.find(l=>l.id===id)||COMMITTEES.find(c=>c.id===id);}
function getAsgn(id){return isLdrId(id)?leaderAsgn:assignments;}
function getAsgnList(id){return (getAsgn(id)[id]||[]);}

function getApplicants(commId){
  const list=[];
  if(isLdrId(commId)){
    students.forEach(s=>{
      const lp=s.leaderPrefs[commId];
      if(!lp||lp.wish!=='yes')return;
      const score=(RANK_SCORE[lp.rank]||0)*10+3;
      list.push({student:s,prefLabel:'希望',prefCls:'wish',reason:lp.reason,rank:lp.rank,score});
    });
  } else {
    students.forEach(s=>{
      s.prefs.forEach((p,i)=>{
        if(p.commId!==commId)return;
        const score=(RANK_SCORE[p.rank]||0)*10+PREF_SCORE[i+1];
        list.push({student:s,prefLabel:`第${i+1}希望`,prefCls:`p${i+1}`,reason:p.reason,rank:p.rank,score});
      });
    });
  }
  return list.sort((a,b)=>b.score-a.score);
}
function isAsgnAnywhere(sid){
  const s=String(sid);
  return [...Object.values(assignments),...Object.values(leaderAsgn)].some(arr=>arr.map(String).includes(s));
}

// 他委員会決定済み非表示フラグ（グローバルで保持）
let hideAssignedFlag = true;

function renderCommDetail(commId){
  const comm=getCommInfo(commId);
  const isLdr=isLdrId(commId);
  const asgnArr=getAsgnList(commId);
  const badgeCls=isLdr?comm.cls:'';
  const note=isLdr
    ?'ランクABC×10。希望理由を読んでランクを付けてからスコア順に選んでください。'
    :'スコア＝理由ランク×10 ＋ 希望順位ボーナス（第一:3 第二:2 第三:1）';

  const allApps=getApplicants(commId);

  // 他委員会で決定済みの児童を除外（フラグON時）
  const apps=allApps.filter(a=>{
    const sid=String(a.student.id);
    if(asgnArr.map(String).includes(sid)) return true; // この委員会の決定者は常に表示
    if(hideAssignedFlag && isAsgnAnywhere(a.student.id)) return false;
    return true;
  });
  const hiddenCount=allApps.length - apps.length;

  const cards=apps.length===0
    ?`<div class="no-applicants">希望者がいません${hiddenCount>0?' （他委員会決定済み '+hiddenCount+'名を非表示）':''}</div>`
    :apps.map(a=>{
      const sid=String(a.student.id);
      const here=asgnArr.map(String).includes(sid);
      const elsewhere=!here&&isAsgnAnywhere(a.student.id);
      const cardCls=here?'assigned':elsewhere?'conflict':'';
      const sLabel=`スコア: ${a.score}${a.rank?' (ランク'+a.rank+')':' (ランク未付与)'}`;
      let act;
      if(here){
        act=`<button class="assign-btn assigned">✓ 決定済</button>
             <button class="unassign-btn" onclick="doUnassign('${commId}','${a.student.id}')">取消</button>`;
      } else if(elsewhere){
        act=`<button class="assign-btn" style="border-color:var(--warn);color:var(--warn)" onclick="doOverride('${commId}','${a.student.id}')">⚠️ 強制決定</button>`;
      } else if(asgnArr.length>=comm.cap){
        act=`<button class="assign-btn disabled">定員満</button>`;
      } else {
        act=`<button class="assign-btn" onclick="doAssign('${commId}','${a.student.id}')">決定</button>`;
      }
      return `<div class="applicant-card ${cardCls}">
        <div class="app-meta">
          <div class="app-pref-badge ${a.prefCls}">${a.prefLabel}</div>
          <div class="rank-badge ${a.rank||'none'}">${a.rank||'?'}</div>
        </div>
        <div class="app-body">
          <div class="app-name">${a.student.num}番 ${esc(a.student.name)}</div>
          <div class="app-reason">${esc(a.reason)||'<span style="color:var(--muted)">理由未入力</span>'}</div>
          <div class="app-score">${sLabel}${elsewhere?' ⚠ 他に決定済':''}</div>
        </div>
        <div class="app-actions">${act}</div>
      </div>`;
    }).join('');

  document.getElementById('committeeDetailPanel').innerHTML=`
    <div class="comm-detail-header">
      <span style="font-size:1.45rem">${comm.icon}</span>
      <div class="comm-detail-title">${comm.name}</div>
      <div class="comm-cap-badge ${badgeCls}">定員 ${comm.cap}名 ／ 現在 ${asgnArr.length}名</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
      <p style="font-size:0.74rem;color:var(--muted);flex:1">${note}</p>
      <label style="display:flex;align-items:center;gap:5px;font-size:0.74rem;color:var(--ink2);white-space:nowrap;cursor:pointer">
        <input type="checkbox" ${hideAssignedFlag?'checked':''} onchange="hideAssignedFlag=this.checked;renderCommDetail('${commId}')">
        他委員会決定済みを隠す${hiddenCount>0?' ('+hiddenCount+'名)':''}
      </label>
    </div>
    ${cards}`;
}

function doAssign(cid,sid){
  const st=getAsgn(cid); if(!st[cid])st[cid]=[];
  if(!st[cid].includes(sid))st[cid].push(sid);
  save();
  renderCommTab();          // 左パネルの人数カウント更新
  renderCommDetail(cid);    // 現在の詳細パネル再描画（決定済み表示・定員満反映）
  showToast('決定しました','success');
}
function doOverride(cid,sid){
  Object.keys(assignments).forEach(c=>{assignments[c]=(assignments[c]||[]).filter(x=>x!==sid);});
  Object.keys(leaderAsgn).forEach(l=>{leaderAsgn[l]=(leaderAsgn[l]||[]).filter(x=>x!==sid);});
  const st=getAsgn(cid); if(!st[cid])st[cid]=[];
  if(!st[cid].includes(sid))st[cid].push(sid);
  save();
  renderCommTab();
  renderCommDetail(cid);
  showToast('他から移動して決定しました');
}
function doUnassign(cid,sid){
  const st=getAsgn(cid); if(st[cid])st[cid]=st[cid].filter(x=>x!==sid);
  save();
  renderCommTab();
  if(activeComm===cid)renderCommDetail(cid);
  showToast('取り消しました');
}

// ============================================================
// 結果タブ
// ============================================================
function renderResult(){
  const allAsgn=[...Object.values(assignments),...Object.values(leaderAsgn)].flat().map(String);
  const unassigned=students.filter(s=>!allAsgn.includes(String(s.id)));

  const uSec=document.getElementById('unassignedSection');
  if(unassigned.length>0){
    uSec.innerHTML=`<div class="unassigned-section">
      <h3>⚠️ 未決定の児童（${unassigned.length}名）</h3>
      <div>${unassigned.map(s=>`<span class="unassigned-chip">${s.num}番 ${esc(s.name)}</span>`).join('')}</div>
    </div>`;
  } else {
    uSec.innerHTML=students.length>0
      ?`<div style="background:var(--success-l);border-radius:10px;padding:10px 14px;margin-bottom:12px;color:var(--success);font-weight:700;font-size:0.83rem;border:1.5px solid var(--success)">✅ 全員の委員会が決定しました！</div>`:'';
  }

  // リーダー結果
  document.getElementById('leaderResultGrid').innerHTML=LEADERS.map(ldr=>{
    const ids=(leaderAsgn[ldr.id]||[]);
    const rows=ids.length===0
      ?`<div class="result-empty">（決定者なし）</div>`
      :ids.map((sid,i)=>{
        const stu=students.find(s=>String(s.id)===String(sid)); if(!stu)return'';
        const lp=stu.leaderPrefs[ldr.id];
        return `<div class="result-member">
          <div class="num">${i+1}</div>
          <div class="mname">${stu.num}番 ${esc(stu.name)}</div>
          <div class="mpref wish">希望</div>
          ${lp?.rank?`<div class="mrank ${lp.rank}">${lp.rank}</div>`:''}
        </div>`;
      }).join('');
    return `<div class="leader-result-card ${ldr.cls}">
      <div class="lr-header ${ldr.cls}">
        <span style="font-size:1.2rem">${ldr.icon}</span>
        <div class="lr-title">${ldr.name}</div>
        <div class="lr-count">${ids.length}/${ldr.cap}名</div>
      </div>
      <div class="lr-body">
        ${rows}
        ${ids.length>ldr.cap?`<div class="result-over">⚠ 定員超過</div>`:''}
      </div>
    </div>`;
  }).join('');

  // 通常委員会結果
  document.getElementById('resultGrid').innerHTML=COMMITTEES.map(c=>{
    const ids=(assignments[c.id]||[]);
    const rows=ids.length===0
      ?`<div class="result-empty">（決定者なし）</div>`
      :ids.map((sid,i)=>{
        const stu=students.find(s=>String(s.id)===String(sid)); if(!stu)return'';
        const pref=stu.prefs.find(p=>p.commId===c.id);
        const pn=pref?stu.prefs.indexOf(pref)+1:0;
        return `<div class="result-member">
          <div class="num">${i+1}</div>
          <div class="mname">${stu.num}番 ${esc(stu.name)}</div>
          ${pn?`<div class="mpref p${pn}">第${pn}希望</div>`:''}
          ${pref?.rank?`<div class="mrank ${pref.rank}">${pref.rank}</div>`:''}
        </div>`;
      }).join('');
    return `<div class="result-card">
      <div class="result-card-header">
        <div style="font-size:1.1rem">${c.icon}</div>
        <div class="result-card-title">${c.name}</div>
        <div class="result-card-count">${ids.length}/${c.cap}名</div>
      </div>
      <div class="result-card-body">
        ${rows}
        ${ids.length>c.cap?`<div class="result-over">⚠ 定員超過</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// CSV
// ============================================================
function exportCSV(){
  const rows=[['出席番号','氏名','決定委員会','種別','希望種別','理由ランク']];
  students.forEach(s=>{
    let cn='未決定',type='',pref='',rank='';
    LEADERS.forEach(ldr=>{
      if((leaderAsgn[ldr.id]||[]).includes(s.id)){
        cn=ldr.name; type='リーダー職'; pref='希望';
        rank=s.leaderPrefs[ldr.id]?.rank||'';
      }
    });
    COMMITTEES.forEach(c=>{
      if((assignments[c.id]||[]).includes(s.id)){
        cn=c.name; type='通常委員会';
        const p=s.prefs.find(p=>p.commId===c.id);
        if(p){pref=`第${s.prefs.indexOf(p)+1}希望`;rank=p.rank||'';}
      }
    });
    rows.push([s.num,s.name,cn,type,pref,rank]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='委員会決定結果.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('CSVを出力しました','success');
}

// ============================================================
// ユーティリティ
// ============================================================
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// 名簿貼り付けインポート
// ============================================================
function openPasteModal() {
  document.getElementById('pasteArea').value = '';
  document.getElementById('pastePreview').textContent = '';
  document.getElementById('pasteModal').classList.add('active');
  setTimeout(function(){ document.getElementById('pasteArea').focus(); }, 100);

  // リアルタイムプレビュー
  document.getElementById('pasteArea').oninput = function() {
    var lines = this.value.trim().split('\n').filter(function(l){ return l.trim(); });
    var valid = lines.filter(function(l){ return l.includes(',') || l.trim(); });
    document.getElementById('pastePreview').textContent =
      valid.length > 0 ? valid.length + '名を検出しました' : '';
  };
}

function executePasteImport() {
  var raw = document.getElementById('pasteArea').value.trim();
  if (!raw) { showToast('データを貼り付けてください', 'error'); return; }

  var lines = raw.split('\n').filter(function(l){ return l.trim(); });
  var parsed = [];
  lines.forEach(function(line, i) {
    var parts = line.split(',');
    var name = (parts[0] || '').trim();
    var gender = (parts[1] || '').trim();
    if (name) parsed.push({ name: name, gender: gender });
  });

  if (parsed.length === 0) { showToast('読み込めるデータがありません', 'error'); return; }

  var existCount = students.length;
  if (existCount > 0) {
    if (!confirm('現在' + existCount + '名のデータがあります。\n' + parsed.length + '名の名簿で上書きしますか？\n※委員会の決定データは保持されます')) return;
  }

  var oldStudents = students.slice();
  students = parsed.map(function(s, i) {
    var num = i + 1;
    var existing = oldStudents.find(function(os){ return os.name === s.name && os.num === num; });
    if (existing) return existing;
    return makeStu(Date.now() + Math.random() + i, num, s.name);
  });

  save();
  closeModal('pasteModal');
  renderStudentList();
  showToast(students.length + '名を読み込みました ✅', 'success');
}

// ============================================================
// CM CLASS 名簿インポート（localStorage版・同一ドメイン時）
// ============================================================
function importFromCMClass() {
  try {
    const raw = localStorage.getItem('spa_master');
    if (!raw) {
      showToast('CM CLASSのデータが見つかりません', 'error');
      return;
    }
    const master = JSON.parse(raw);
    if (!master.students || master.students.length === 0) {
      showToast('CM CLASSに児童が登録されていません', 'error');
      return;
    }
    const existCount = students.length;
    if (existCount > 0) {
      if (!confirm(`現在${existCount}名のデータがあります。\nCM CLASSの名簿（${master.students.length}名）で上書きしますか？\n※委員会の決定データは保持されます`)) return;
    }
    const oldStudents = students.slice();
    students = master.students.map(function(s, i) {
      const num = i + 1;
      const name = s.name || '';
      const existing = oldStudents.find(function(os) {
        return os.name === name && os.num === num;
      });
      if (existing) return existing;
      return makeStu(Date.now() + Math.random() + i, num, name);
    });
    save();
    renderStudentList();
    showToast('CM CLASSから ' + students.length + ' 名を読み込みました ✅', 'success');
  } catch(e) {
    showToast('読み込みエラー: ' + e.message, 'error');
  }
}

renderStudentList();
